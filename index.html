<!DOCTYPE html>
<html>
<head>
<title>South Zone Meter Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
padding:30px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:90%;
padding:12px;
font-size:16px;
margin:10px;
}

button{
padding:10px 20px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>South Zone Meter Search</h2>

<select id="division">
<option value="">All Divisions</option>
<option>CITY SUNAM</option>
<option>DHURI</option>
<option>DIRBA</option>
<option>PATTRAN</option>
<option>SANGRUR</option>
<option>SUBURBAN SUNAM</option>
</select>

<input type="text" id="search" placeholder="Enter Meter / Account / Name / Mobile">

<button onclick="search()">Search</button>

<div id="result"></div>

</div>

<script>

let data=[];

fetch("sangrur_circle_meter_search_data.csv")
.then(response=>response.text())
.then(text=>{

let rows=text.split("\n");

for(let i=1;i<rows.length;i++){

let cols=rows[i].split(",");

data.push(cols);

}

});

function search(){

let input=document.getElementById("search").value.toLowerCase();
let division=document.getElementById("division").value.toLowerCase();

let html="<table><tr><th>Account</th><th>Name</th><th>Address</th><th>Division</th><th>Meter</th><th>Mobile</th></tr>";

for(let i=0;i<data.length;i++){

let row=data[i].join(" ").toLowerCase();
let div=data[i][3].toLowerCase();

if(row.includes(input)){

if(division=="" || div.includes(division)){

html+="<tr>";

html+="<td>"+data[i][0]+"</td>";
html+="<td>"+data[i][1]+"</td>";
html+="<td>"+data[i][2]+"</td>";
html+="<td>"+data[i][3]+"</td>";
html+="<td>"+data[i][5]+"</td>";
html+="<td>"+data[i][6]+"</td>";

html+="</tr>";

}

}

}

html+="</table>";

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
